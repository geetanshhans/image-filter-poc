# Local infra for Argon. Runs only Postgres + Redis.
# The API and web app run on the host via `npm run dev` so hot reload works naturally.
services:
  postgres:
    image: postgres:16-alpine
    container_name: argon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: argon
      POSTGRES_PASSWORD: argon_dev_password
      POSTGRES_DB: argon
    ports:
      - "5432:5432"
    volumes:
      - argon-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argon -d argon"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: argon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - argon-redis-data:/data
    # AOF persistence so streams survive a restart during dev
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: argon-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: argon_minio
      MINIO_ROOT_PASSWORD: argon_minio_secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (http://localhost:9001)
    volumes:
      - argon-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot container that creates the bucket on first run.
  minio-setup:
    image: minio/mc:latest
    container_name: argon-minio-setup
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
        sleep 3;
        mc alias set local http://minio:9000 argon_minio argon_minio_secret;
        mc mb --ignore-existing local/argon-local;
        mc anonymous set public local/argon-local;
        echo 'Bucket ready';
      "

volumes:
  argon-postgres-data:
  argon-redis-data:
  argon-minio-data:
